name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Compile
        working-directory: kubemq-java
        run: mvn compile -B -q

      - name: Compile examples
        working-directory: kubemq-java-example
        run: mvn compile -B -q

  unit-tests:
    name: Unit Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['11', '17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Run unit tests
        working-directory: kubemq-java
        run: mvn test -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-java-${{ matrix.java }}
          path: kubemq-java/target/surefire-reports/

      - name: Upload JaCoCo report
        if: matrix.java == '17'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: kubemq-java/target/site/jacoco/

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      kubemq:
        image: kubemq/kubemq:latest
        ports:
          - 50000:50000
          - 9090:9090
          - 8080:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run integration tests
        working-directory: kubemq-java
        env:
          KUBEMQ_ADDRESS: localhost:50000
        run: mvn verify -B -DskipUnitTests=true

      - name: Smoke-test examples
        working-directory: kubemq-java-example
        run: |
          timeout 30 mvn -q exec:java -Dexec.mainClass="io.kubemq.example.connection.ConnectExample" || true
          timeout 30 mvn -q exec:java -Dexec.mainClass="io.kubemq.example.connection.PingExample" || true
          timeout 30 mvn -q exec:java -Dexec.mainClass="io.kubemq.example.events.BasicPubSubExample" || true
          timeout 30 mvn -q exec:java -Dexec.mainClass="io.kubemq.example.queues.SendReceiveExample" || true
          timeout 30 mvn -q exec:java -Dexec.mainClass="io.kubemq.example.commands.SendCommandExample" || true
          timeout 30 mvn -q exec:java -Dexec.mainClass="io.kubemq.example.queries.SendQueryExample" || true
          timeout 30 mvn -q exec:java -Dexec.mainClass="io.kubemq.example.eventsstore.PersistentPubSubExample" || true
          timeout 30 mvn -q exec:java -Dexec.mainClass="io.kubemq.example.management.ListChannelsExample" || true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests with coverage
        working-directory: kubemq-java
        run: mvn test jacoco:report jacoco:check -B

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: kubemq-java/target/site/jacoco/jacoco.xml
          flags: unittests
          fail_ci_if_error: false
