version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/kubemq-java"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    groups:
      grpc:
        patterns:
          - "io.grpc:*"
        update-types:
          - "minor"
          - "patch"
      protobuf:
        patterns:
          - "com.google.protobuf:*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.awaitility*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
